volumes:
  pqat-api-data:

services:
  api:
    build:
      context: ./src/backend
      dockerfile: PostgresQueryAutopsyTool.Api/Dockerfile
    environment:
      - ASPNETCORE_URLS=http://+:8080
      - ASPNETCORE_ENVIRONMENT=Production
      - Storage__DatabasePath=/app/data/autopsy.db
      - Storage__ArtifactTtlHours=720
    volumes:
      - pqat-api-data:/app/data
    ports:
      - "8080:8080"

  web:
    build:
      context: ./src/frontend/web
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - api

