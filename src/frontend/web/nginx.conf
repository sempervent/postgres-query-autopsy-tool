server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Proxy API calls to the backend.
  # Phase 53–54: Browsers send auth on these requests (`Authorization`, `X-Api-Key`,
  # `X-PQAT-User` / `X-PQAT-Groups` in ProxyHeaders mode, etc.). nginx forwards
  # client request headers to the upstream by default — do not strip them. If you add another reverse
  # proxy in front, configure it to forward those headers; see docs/deployment-auth.md.
  location /api/ {
    proxy_pass http://api:8080;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}

